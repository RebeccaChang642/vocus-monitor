name: Vocus Page Monitor

on:
  schedule:
    - cron: "*/30 * * * *"   # 每 30 分鐘監控
    - cron: "0 1 * * *"       # 每天 UTC 01:00 = 台灣時間 09:00 發日報
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run monitor script
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          SEND_DAILY_REPORT: ${{ github.event.schedule == '0 1 * * *' }}
        run: python check_vocus.py

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain snapshot.json)" ]; then
            git add snapshot.json
            git commit -m "Update snapshot $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          else
            echo "No snapshot changes"
          fi
