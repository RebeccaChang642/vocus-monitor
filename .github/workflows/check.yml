name: Vocus Page Monitor

on:
  # 排程觸發改由外部 cron-job.org 透過 workflow_dispatch API 呼叫
  # （GitHub 內建 schedule 經實測延遲 15-45 分鐘且會丟事件，不適合本任務）
  # 監控頻率 / 日報時間都在 cron-job.org 那邊設定
  workflow_dispatch:

permissions:
  contents: write

# 同一時間只跑一個 run，避免兩個 run 同時 commit 造成 push 衝突或重複發報
concurrency:
  group: vocus-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run monitor script
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python check_vocus.py

      - name: Commit state if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain snapshot.json state.json)" ]; then
            git add snapshot.json state.json
            git commit -m "Update state $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git pull --rebase --autostash || true
            git push
          else
            echo "No changes"
          fi
